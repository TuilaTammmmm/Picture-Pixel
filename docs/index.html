<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <meta http-equiv="X-UA-Compatible" content="ie=edge">

 <link rel="stylesheet" href="assets/style.min.css?v1.1">
 <link rel="stylesheet" href="assets/slim.select.css">
 <title>Pixel It - Create pixel art from an image</title>
</head>
<body style="margin: 0; padding: 0; overflow: hidden; height: 100vh; background-color: #21383a;">

<div class="split-layout" style="display: flex; height: 100vh; overflow: hidden; width: 100%;">
  <div class="left-panel" style="flex: 0 0 450px; overflow-y: auto; padding: 20px; box-sizing: border-box; background-color: #21383a; border-right: 1px solid #1a2c2e;">
    <div class="selectors" style="display: flex; flex-direction: column; gap: 15px; align-items: stretch;">
      <!--upload image -->
      <span id="uploadspan" style="width: 100%; display: flex; flex-direction: column;">
        <label id="uploadimage" for="pixlInput" style="width: 100%;">Tải ảnh lên<input type="file" class="inputbtn" id="pixlInput" style="width: 100%;"></label>
        <span id="image_dimensions" style="font-size: 14px; margin-top: 5px; color: #eee; font-weight: normal; text-transform: none; white-space: nowrap;"></span>
      </span>
      <!-- block size controls -->
      <div style="width: 100%; display: flex; flex-direction: column; gap: 10px; background-color: rgba(255,255,255,0.05); padding: 10px; border-radius: 5px; box-sizing: border-box;">
        <div style="display: flex; gap: 15px; margin-bottom: 5px;">
          <label style="display: flex; align-items: center; cursor: pointer; color: #eee; font-size: 14px;"><input type="radio" name="sizemode" value="percent" style="margin-right: 5px;"> Theo tỷ lệ %</label>
          <label style="display: flex; align-items: center; cursor: pointer; color: #eee; font-size: 14px;"><input type="radio" name="sizemode" value="pixel" checked style="margin-right: 5px;"> Độ phân giải Pixel</label>
        </div>
        
        <!-- percent block size -->
        <label id="container-blocksize" for="blocksize" class="inputbtn" style="width: 100%; display: none; flex-wrap: wrap; align-items: center; box-sizing: border-box;">Kích thước tỷ lệ<span id="blockvalue">7</span><span id="pixel_dimensions" style="margin-left: 10px; font-size: 12px; color: #eee; white-space: nowrap; text-transform: none;"></span><input value="7" type="range" min="1" max="100" id="blocksize" style="width: 100%; margin-top: 5px;"></label>

        <!-- absolute pixel size -->
        <label id="container-pixelblock" for="pixelblock" class="inputbtn" style="width: 100%; display: flex; flex-wrap: wrap; align-items: center; box-sizing: border-box;">Độ phân giải<span id="pixelblockvalue">64</span><span id="pixel_dimensions_abs" style="margin-left: 10px; font-size: 12px; color: #eee; white-space: nowrap; text-transform: none;">(64 x 64 px)</span><input value="64" type="range" min="2" max="512" id="pixelblock" style="width: 100%; margin-top: 5px;"></label>
      </div>
      
      <div style="display: flex; gap: 10px; width: 100%;">
        <!-- greyscale -->
        <label for="greyscale" class="inputbtn" style="flex: 1; justify-content: space-between;">Đen trắng<input type="checkbox" id="greyscale"></label>
        <!-- palette -->
        <label for="palette" class="inputbtn" style="flex: 1; justify-content: space-between;">Bảng màu<input type="checkbox"  id="palette"></label>
      </div>

      <div style="display: flex; gap: 10px; width: 100%;">
        <!-- max height -->
        <label for="maxheight" class="inputbtn" style="flex: 1; flex-direction: column; align-items: flex-start;">Cao tối đa<input type="input" value="64" id="maxheight" placeholder="px" style="width: 100%; margin-top: 5px; box-sizing: border-box;"></label>
        <!-- max width -->
        <label for="maxwidth" class="inputbtn" style="flex: 1; flex-direction: column; align-items: flex-start;">Rộng tối đa<input type="input" value="64" id="maxwidth" placeholder="px" style="width: 100%; margin-top: 5px; box-sizing: border-box;"></label>
      </div>
    </div>
    
    <div class="infoselects">
     <!-- color palette example-->
     <div class="colorpalette">
      <div class="text">
        <button class="btn small" id="changepalette" style="width: 100%;">Chọn bảng màu</button>
        <select name="paletteselector" id="paletteselector"></select>
      </div>
      <div class="icons" id="palettecolor">
      </div>
     </div>
     <div class="infoselects">
      <h3 style="margin-top: 15px; font-size: 1.2rem;">Tải bảng màu lên</h3>
      <p style="margin-bottom: 10px; font-size: 0.9rem;">Hỗ trợ file .hex, txt (pixilart.com, Paint.net) và các định dạng tương tự csv.</p>
      <!--upload palette -->
      <label id="uploadpalettelabel" for="uploadpalettefile" style="width: 100%;">Tải bảng màu lên <input type="file" class="inputbtn" id="uploadpalettefile" accepts=".hex, .txt" style="width: 100%;"></label>
     </div>
     <!-- custom palette -->
     <div class="infoselects">
      <h3 style="margin-top: 25px; font-size: 1.2rem;">Bảng màu thủ công</h3>
      <p style="margin-bottom: 10px; font-size: 0.9rem;">Nhấp vào màu để thay đổi</p>
      <div class="custompalette" id="custompalette" style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
        <input type="color" name="customcolor" id="customcolor" style="flex-shrink: 0;">
        <button class="btn small" id="addcustomcolor" style="flex: 1;">Thêm màu</button>
      </div>
      <div id="currentpallete" class="colorpalette" style="min-height: 25px; margin-bottom: 15px;"> </div>
      <button class="btn small" id="savecustompalette" style="width: 100%; margin-bottom: 10px;">Lưu bảng màu</button>
      <p style="font-size: 0.85rem; color: #ccc; margin-bottom: 15px;">Sau khi lưu, tải lại (refresh) trang để xem bảng màu được thêm.</p>
      <button class="btn small" id="clearcustompalettes" style="width: 100%; margin-bottom: 10px;">Xóa bảng màu tùy chỉnh</button>
      <p style="font-size: 0.85rem; color: #ccc;">Xóa tất cả bảng màu tùy chỉnh (không thể khôi phục). Tải lại trang để xem thay đổi.</p>
     </div>
     <div class="dothings" style="margin-top: 25px;">
     <!-- download image -->
     <Button id="downloadimage" class="btn small call" style="width: 100%; font-size: 1.1rem; padding: 10px;">Tải ảnh xuống</Button>
     </div>
    </div>
  </div>
  
  <div class="right-panel" id="canvas-container" style="flex: 1; overflow: auto; display: flex; align-items: center; justify-content: center; background-color: #152425; position: relative;">
     <canvas id="pixelitcanvas" style="transform-origin: center center; transition: transform 0.1s ease-out; cursor: grab; max-width: none; border: none;"></canvas>
  </div>
</div>
  <img src="assets/sky.jpg"  id="pixelitimg" alt="">
  <!--<img style="visibility: hidden;" id="pixlimg" alt="">  -->
  <script src="js/pixelit.min.js"></script>
  <script src="js/slim.select.min.js"></script>
  <script src="js/main.min.js?v1"></script>
  <!-- loader-->
  <div class="loader">
    <div class="lds-spinner"><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div></div>
  </div>

 </body>

</html>
