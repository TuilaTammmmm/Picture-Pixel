<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">

  <link rel="stylesheet" href="assets/style.min.css?v1.1">
  <link rel="stylesheet" href="assets/slim.select.css">
  <title>Pixel It - Create pixel art from an image</title>
  <style>
    /* Modal Background */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    /* Modal Box */
    .modal-box {
      background: #21383a;
      border: 1px solid #1a2c2e;
      border-radius: 8px;
      width: 400px;
      max-width: 90%;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Modal Header */
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: rgba(255, 255, 255, 0.05);
      border-bottom: 1px solid #1a2c2e;
    }

    .modal-title {
      color: #eee;
      margin: 0;
      font-size: 16px;
      font-weight: bold;
    }

    .modal-close {
      color: #eee;
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
    }

    .modal-close:hover {
      color: #dfb213;
    }

    /* Tabs */
    .modal-tabs {
      display: flex;
      border-bottom: 1px solid #1a2c2e;
    }

    .modal-tab {
      flex: 1;
      text-align: center;
      padding: 12px;
      color: #ccc;
      cursor: pointer;
      font-size: 14px;
      background: transparent;
      border: none;
      outline: none;
      transition: background 0.2s, color 0.2s;
    }

    .modal-tab:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    .modal-tab.active {
      color: #dfb213;
      border-bottom: 2px solid #dfb213;
      font-weight: bold;
      background: rgba(0, 0, 0, 0.2);
    }

    /* Tab Content */
    .tab-content {
      display: none;
      padding: 20px;
    }

    .tab-content.active {
      display: block;
    }

    /* Paste Area */
    .paste-area {
      border: 2px dashed #1a2c2e;
      border-radius: 6px;
      padding: 40px 20px;
      text-align: center;
      color: #aaa;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      outline: none;
    }

    .paste-area:focus,
    .paste-area:hover {
      border-color: #dfb213;
      background: rgba(255, 255, 255, 0.02);
      color: #eee;
    }
  </style>
</head>

<body style="margin: 0; padding: 0; overflow: hidden; height: 100vh; background-color: #21383a;">

  <div class="split-layout" style="display: flex; height: 100vh; overflow: hidden; width: 100%;">
    <div class="left-panel"
      style="flex: 0 0 450px; overflow-y: auto; padding: 20px; box-sizing: border-box; background-color: #21383a; border-right: 1px solid #1a2c2e;">
      <div class="selectors" style="display: flex; flex-direction: column; gap: 15px; align-items: stretch;">
        <!--upload image -->
        <span id="uploadspan" style="width: 100%; display: flex; flex-direction: column;">
          <button type="button" class="inputbtn" id="openUploadModalBtn" style="width: 100%; cursor: pointer;">Tải ảnh /
            Dán ảnh mới</button>
          <span id="image_dimensions"
            style="font-size: 14px; margin-top: 5px; color: #eee; font-weight: normal; text-transform: none; white-space: nowrap;"></span>
        </span>
        <!-- block size controls -->
        <div
          style="width: 100%; display: flex; flex-direction: column; gap: 10px; background-color: rgba(255,255,255,0.05); padding: 10px; border-radius: 5px; box-sizing: border-box;">
          <div style="display: flex; gap: 15px; margin-bottom: 5px;">
            <label style="display: flex; align-items: center; cursor: pointer; color: #eee; font-size: 14px;"><input
                type="radio" name="sizemode" value="percent" style="margin-right: 5px;"> Theo tỷ lệ %</label>
            <label style="display: flex; align-items: center; cursor: pointer; color: #eee; font-size: 14px;"><input
                type="radio" name="sizemode" value="pixel" checked style="margin-right: 5px;"> Độ phân giải
              Pixel</label>
          </div>

          <!-- percent block size -->
          <label id="container-blocksize" for="blocksize" class="inputbtn"
            style="width: 100%; display: none; flex-wrap: wrap; align-items: center; box-sizing: border-box;">Kích thước
            tỷ lệ<span id="blockvalue">7</span><span id="pixel_dimensions"
              style="margin-left: 10px; font-size: 12px; color: #eee; white-space: nowrap; text-transform: none;"></span><input
              value="7" type="range" min="1" max="100" id="blocksize" style="width: 100%; margin-top: 5px;"></label>

          <!-- absolute pixel size -->
          <label id="container-pixelblock" for="pixelblock" class="inputbtn"
            style="width: 100%; display: flex; flex-wrap: wrap; align-items: center; box-sizing: border-box;">Độ phân
            giải<span id="pixelblockvalue">64</span><span id="pixel_dimensions_abs"
              style="margin-left: 10px; font-size: 12px; color: #eee; white-space: nowrap; text-transform: none;">(64 x
              64 px)</span><input value="64" type="range" min="2" max="512" id="pixelblock"
              style="width: 100%; margin-top: 5px;"></label>
        </div>

        <div style="display: flex; gap: 10px; width: 100%;">
          <!-- greyscale -->
          <label for="greyscale" class="inputbtn" style="flex: 1; justify-content: space-between;">Đen trắng<input
              type="checkbox" id="greyscale"></label>
          <!-- palette -->
          <label for="palette" class="inputbtn" style="flex: 1; justify-content: space-between;">Bảng màu<input
              type="checkbox" id="palette"></label>
        </div>

        <div style="display: flex; gap: 10px; width: 100%;">
          <!-- max height -->
          <label for="maxheight" class="inputbtn" style="flex: 1; flex-direction: column; align-items: flex-start;">Cao
            tối đa<input type="input" value="64" id="maxheight" placeholder="px"
              style="width: 100%; margin-top: 5px; box-sizing: border-box;"></label>
          <!-- max width -->
          <label for="maxwidth" class="inputbtn" style="flex: 1; flex-direction: column; align-items: flex-start;">Rộng
            tối đa<input type="input" value="64" id="maxwidth" placeholder="px"
              style="width: 100%; margin-top: 5px; box-sizing: border-box;"></label>
        </div>
      </div>

      <div class="infoselects">
        <!-- color palette example-->
        <div class="colorpalette">
          <div class="text">
            <button class="btn small" id="changepalette" style="width: 100%; margin-bottom: 15px;">Chọn bảng màu</button>
            <select name="paletteselector" id="paletteselector"></select>

            <div style="display: flex; gap: 8px; margin-top: 15px; align-items: center;">
              <input type="text" id="renamepalettetext" placeholder="Tên bảng màu"
                style="flex: 1; padding: 0 10px; height: 32px; border-radius: 4px; border: 1px solid #1a2c2e; background: rgba(255,255,255,0.1); color: #eee; outline: none; font-size: 13px; box-sizing: border-box;">
              <button id="renamepalettebtn"
                style="flex-shrink: 0; padding: 0 15px; height: 32px; margin: 0; white-space: nowrap; border: none; border-radius: 4px; background: #dfb213; color: #fff; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 13px;">Đổi
                tên</button>
            </div>
            <button id="deletepalettebtn"
              style="width: 100%; margin-top: 10px; padding: 8px; border-radius: 4px; border: none; background-color: #a83232; color: #fff; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 13px;">Xóa
              bảng màu này</button>
          </div>
          <div class="icons" id="palettecolor">
          </div>
        </div>
        <div class="infoselects">
          <h3 style="margin-top: 15px; font-size: 1.2rem;">Tải bảng màu lên</h3>
          <!--upload palette -->
          <label id="uploadpalettelabel" for="uploadpalettefile" style="width: 100%; margin-top: 10px;"><input
              type="file" id="uploadpalettefile" accepts=".hex, .txt"
              style="width: 100%; color: #ccc; font-size: 14px; cursor: pointer;"></label>
        </div>
        <!-- custom palette -->
        <div class="infoselects">
          <h3 style="margin-top: 25px; font-size: 1.2rem;">Bảng màu thủ công</h3>
          <div class="custompalette" id="custompalette"
            style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px;">
            <div style="display: flex; align-items: center; gap: 10px;">
              <input type="color" name="customcolor" id="customcolor"
                style="flex-shrink: 0; height: 35px; width: 40px; border: none; padding: 0; background: none; cursor: pointer;"
                title="Chọn màu bằng bộ chọn">
              <input type="text" id="colorinputtext" placeholder="Nhập mã màu (VD: #fff, rgb(0,0,0))"
                style="flex: 1; padding: 8px; border-radius: 4px; border: 1px solid #1a2c2e; background: rgba(255,255,255,0.1); color: #eee; outline: none;">
            </div>
            <button class="btn small" id="addcustomcolor" style="width: 100%;">Thêm màu</button>
            <p style="font-size: 0.85rem; color: #ccc; margin: 0;">Hỗ trợ dán nhiều màu cách nhau bằng dấu phẩy.</p>
          </div>
          <div id="currentpallete" class="colorpalette" style="min-height: 0; margin-top: 5px; margin-bottom: 10px;"></div>
          <input type="text" id="custompalettename" placeholder="Tên bảng màu (Không bắt buộc)"
            style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #1a2c2e; background: rgba(255,255,255,0.1); color: #eee; outline: none; box-sizing: border-box; margin-bottom: 15px;">
          <button class="btn small" id="savecustompalette" style="width: 100%; margin-bottom: 15px;">Lưu bảng
            màu</button>
          <p style="font-size: 0.85rem; color: #ccc; margin-bottom: 5px;">Sau khi lưu, tải lại trang để xem bảng màu
            được thêm.</p>
        </div>
        <div class="dothings" style="margin-top: 25px;">
          <!-- download image -->
          <Button id="downloadimage" class="btn small call" style="width: 100%; font-size: 1.1rem; padding: 10px;">Tải ảnh xuống</Button>
          <button id="toggle-ai-btn" class="btn small" style="width: 100%; margin-top: 15px; font-size: 1rem; padding: 8px; background: #2b484b;">Bật Tính năng AI</button>
        </div>
      </div>
    </div>

    <div class="center-panel" id="canvas-container"
      style="flex: 1; overflow: auto; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #152425; position: relative;">
      
      <div id="ai-original-container" style="display: none; height: 50%; width: 100%; flex-shrink: 0; justify-content: center; align-items: center; border-bottom: 2px dashed #444; background: #0f1a1a; padding: 10px; box-sizing: border-box; overflow: hidden; position: relative;">
        <canvas id="pixelitcanvas_orig" style="transform-origin: center center; transition: transform 0.1s ease-out; cursor: grab; max-width: none; border: none;"></canvas>
      </div>
      
      <div id="canvas-sub-container" style="flex: 1; width: 100%; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative;">
        <canvas id="pixelitcanvas"
          style="transform-origin: center center; transition: transform 0.1s ease-out; cursor: grab; max-width: none; border: none;"></canvas>
      </div>
    </div>

    <div class="ai-panel" id="ai-panel" style="display: none; width: 350px; flex-shrink: 0; padding: 20px; overflow-y: auto; background-color: #1a2c2e; border-left: 2px solid #0f1a1a;">
      <h2 style="font-size: 1.5rem; margin-bottom: 20px;">CÀI ĐẶT AI</h2>
      <div class="infoselects">
        <label style="display: block; font-size: 0.9rem; margin-bottom: 5px; color: #ccc;">API Key (Stability AI):</label>
        <input type="password" id="ai-apikey" placeholder="sk-..." style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #21383a; background: rgba(255,255,255,0.1); color: #fff; margin-bottom: 15px;">
        
        <label style="display: block; font-size: 0.9rem; margin-bottom: 5px; color: #ccc;">Prompt (Mô tả):</label>
        <textarea id="ai-prompt" rows="4" placeholder="Ví dụ: A magical spellbook pixel art, beautiful colors..." style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #21383a; background: rgba(255,255,255,0.1); color: #fff; margin-bottom: 15px; resize: vertical; box-sizing: border-box;"></textarea>

        <label style="display: block; font-size: 0.9rem; margin-bottom: 5px; color: #ccc;">Độ bám sát phác thảo (0 - 1):</label>
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
           <input type="range" id="ai-strength" min="0" max="1" step="0.05" value="0.5" style="flex: 1;">
           <span id="ai-strength-val" style="width: 30px; text-align: center;">0.5</span>
        </div>

        <button class="btn small call" id="ai-generate-btn" style="width: 100%; font-size: 1.1rem; padding: 10px; margin-top: 10px;">Vẽ ảnh bằng AI</button>
        <div id="ai-terminal" style="background: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; padding: 10px; height: 130px; overflow-y: auto; font-size: 12px; border: 1px solid #333; margin-top: 15px; border-radius: 4px; box-sizing: border-box;">
          &gt; Hệ thống AI đã sẵn sàng...<br>
        </div>
      </div>
    </div>
  </div>
  <img src="assets/sky.jpg" id="pixelitimg" alt="" style="display: none;">
  <img src="assets/sky.jpg" id="pixelitimg_orig" alt="" style="display: none;">
  <script src="js/pixelit.min.js"></script>
  <script src="js/slim.select.min.js"></script>
  <script src="js/main.min.js?v1"></script>
  <!-- loader-->
  <div class="loader">
    <div class="lds-spinner">
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
    </div>
  </div>

  <div class="modal-overlay" id="uploadModal">
    <div class="modal-box">
      <div class="modal-header">
        <h3 class="modal-title">Chọn ảnh đầu vào</h3>
        <span class="modal-close" id="closeUploadModal">&times;</span>
      </div>
      <div class="modal-tabs">
        <button class="modal-tab active" data-tab="tab-paste">Dán vào</button>
        <button class="modal-tab" data-tab="tab-upload">Tải lên</button>
      </div>
      <div class="tab-content active" id="tab-paste">
        <div class="paste-area" id="pasteArea" tabindex="0">
          <p style="margin: 0; font-size: 15px;">Bấm vào đây và nhấn <strong>Ctrl + V</strong></p>
          <p style="margin: 10px 0 0 0; font-size: 12px; opacity: 0.7;">để dán ảnh từ bộ nhớ tạm</p>
        </div>
      </div>
      <div class="tab-content" id="tab-upload">
        <label id="uploadimage" for="pixlInput"
          style="width: 100%; text-align: center; display: block; margin: 0; color: #eee;">
          Chọn tệp từ máy tính
          <input type="file" class="inputbtn" id="pixlInput" style="width: 100%; margin-top: 15px;">
        </label>
      </div>
    </div>
  </div>
</body>

</html>
